name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: smart-data-analyzer
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: smart-data-analyzer/requirements*.txt
      - run: pip install -r requirements-dev.txt
      - run: python -m compileall -q app.py modules tests
      - run: python -m pytest -q
